apiVersion: v1
kind: ConfigMap
metadata:
  name: credit-risk-config
  namespace: credit-risk-mlops
data:
  # Informational only — the model is baked into the image at build time, so
  # pods need no MLflow credentials or network access to start. /model-info
  # surfaces the RUN_ID baked via the Docker build ARG.
  MLFLOW_TRACKING_URI: "https://dagshub.com/s-amin.mohamed/credit-risk-mlops-fairness.mlflow"
